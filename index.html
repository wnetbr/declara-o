<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para o Meu Amor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');

        :root {
            --primary: #ff4d6d;
            --secondary: #ff758f;
            --bg: #fff0f3;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* Fundo com gradiente suave animado */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #ffafbd, #ffc3a0, #ffafbd);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: -1;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* O Card Principal - Estilo Vidro Refinado */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: cardEntrance 1.2s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.8) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--primary);
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        .message {
            font-size: 1.15rem;
            line-height: 1.7;
            color: #444;
            min-height: 140px;
            font-weight: 400;
        }

        /* Botão Aprimorado */
        .btn-love {
            margin-top: 30px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3);
        }

        .btn-love:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 15px 25px rgba(255, 77, 109, 0.4);
            background: var(--secondary);
        }

        /* Partículas de Coração */
        .heart-particle {
            position: fixed;
            pointer-events: none;
            z-index: 99;
            animation: fly linear forwards;
        }

        @keyframes fly {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <div class="card">
        <h1>Para o Meu Amor ❤️</h1>
        <div class="message" id="typewriter"></div>
        <button class="btn-love" onclick="createHearts()">Surpresa!</button>
    </div>

    <script>
        const text = "Desde que você chegou, cada detalhe da vida ganhou uma cor mais vibrante. Você é o meu porto seguro, a minha melhor risada e o motivo do meu sorriso mais sincero. Eu te amo hoje, amanhã e sempre!";
        let i = 0;

        // Efeito de escrita clássico e suave
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 50);
            }
        }

        // Função de chuva de corações turbinada
        function createHearts() {
            for (let j = 0; j < 30; j++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart-particle';
                    heart.innerHTML = ['❤️', '💖', '✨', '🌸'][Math.floor(Math.random() * 4)];
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.top = '100vh';
                    heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                    heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    document.body.appendChild(heart);
                    
                    setTimeout(() => heart.remove(), 5000);
                }, j * 100);
            }
        }

        // Inicia automaticamente
        window.onload = () => {
            setTimeout(typeWriter, 800);
        };
    </script>
</body>
</html>
